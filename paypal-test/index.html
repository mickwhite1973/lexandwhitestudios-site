<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Web Protect Pro - PayPal Test</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f1ea;
      color: #1f1a12;
      margin: 0;
      padding: 32px;
    }

    .card {
      max-width: 720px;
      margin: 0 auto;
      background: #fffdf8;
      border: 1px solid #d6c2a8;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    .price {
      font-size: 24px;
      font-weight: bold;
      margin: 18px 0;
    }

    .note {
      background: #fff7d6;
      border: 1px solid #e8c85e;
      border-radius: 12px;
      padding: 12px;
      margin: 16px 0;
    }

    #paypal-button-container {
      margin-top: 22px;
    }

    #status {
      margin-top: 18px;
      font-weight: bold;
    }

    a {
      color: #1d4ed8;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Web Protect Pro</h1>

    <p>This is a PayPal sandbox test checkout page for Web Protect Pro.</p>

    <div class="price">Test price: AUD $20.00</div>

    <div class="note">
      Test only. No live licence key will be created from this page yet.
    </div>

    <div id="paypal-button-container"></div>

    <div id="status"></div>

    <p style="margin-top: 28px;">
      <a href="/">Return to Lex &amp; White Studios</a>
    </p>
  </div>

  <!--
    Replace YOUR_SANDBOX_CLIENT_ID below with the PayPal sandbox client ID.
    Do NOT paste the PayPal client secret here.
  -->
  <script src="https://www.paypal.com/sdk/js?client-id=YOUR_SANDBOX_CLIENT_ID&currency=AUD&intent=capture"></script>

  <script>
    const statusBox = document.getElementById("status");

    paypal.Buttons({
      style: {
        layout: "vertical",
        color: "gold",
        shape: "rect",
        label: "paypal"
      },

      createOrder: function(data, actions) {
        statusBox.textContent = "Creating test order...";

        return actions.order.create({
          purchase_units: [{
            description: "Web Protect Pro - 3 Year Licence Test",
            amount: {
              currency_code: "AUD",
              value: "20.00"
            }
          }]
        });
      },

      onApprove: function(data, actions) {
        statusBox.textContent = "Capturing test payment...";

        return actions.order.capture().then(function(details) {
          const payerName =
            details &&
            details.payer &&
            details.payer.name &&
            details.payer.name.given_name
              ? details.payer.name.given_name
              : "customer";

          statusBox.textContent =
            "Sandbox payment complete. Thanks, " + payerName +
            ". Licence generation will be connected later.";
        });
      },

      onCancel: function() {
        statusBox.textContent = "Test payment cancelled.";
      },

      onError: function(err) {
        console.error(err);
        statusBox.textContent = "PayPal test error. Check the sandbox client ID and browser console.";
      }
    }).render("#paypal-button-container");
  </script>
</body>
</html>
