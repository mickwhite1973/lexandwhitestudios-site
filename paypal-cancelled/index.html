<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment cancelled | Web Protect Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f1ea;
      color: #1f1a12;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .card {
      background: #fffdf8;
      border: 1px solid #d9c9b4;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    .note {
      color: #6e6254;
      line-height: 1.6;
      font-size: 16px;
    }

    .box {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #fff7ed;
      color: #7c2d12;
      font-weight: bold;
      line-height: 1.5;
    }

    .small {
      font-size: 13px;
      color: #6e6254;
      margin-top: 18px;
      line-height: 1.5;
    }

    a {
      color: #2563eb;
    }

    .buttons {
      margin-top: 24px;
    }

    .button {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      background: #1f1a12;
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .button.secondary {
      background: #6e6254;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card">
      <h1>Payment cancelled</h1>

      <div class="box">
        Your PayPal checkout was cancelled. No Web Protect Pro licence purchase was completed.
      </div>

      <p class="note">
        You can return to the buy page and try again when ready.
      </p>

      <p class="small">
        Need help? Email
        <a href="mailto:support@lexandwhitestudios.com">support@lexandwhitestudios.com</a>.
      </p>

      <div class="buttons">
        <a class="button" href="/buy/">Return to buy page</a>
        <a class="button secondary" href="/">Return to Lex &amp; White Studios</a>
      </div>
    </section>
  </main>
</body>
</html>
